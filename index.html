<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fida's Personal AI | Portfolio Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0e1117;
            --card: #161b22;
            --input-bg: #21262d;
            --text-main: #fafafa;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 100%);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }

        .app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 0.5rem;
            animation: fadeIn 0.15s ease-out;
        }

        .message-container {
            display: flex;
            gap: 0.6rem;
            max-width: 85%;
            align-items: flex-start;
        }

        .user-align {
            justify-content: flex-end;
        }

        .user-align .message-container {
            flex-direction: row-reverse;
        }

        .bot-align {
            justify-content: flex-start;
        }

        .bubble {
            padding: 0.5rem 0.8rem;
            border-radius: 0.8rem;
            font-size: 0.775rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-bubble {
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-top-right-radius: 2px;
        }

        .bot-bubble {
            background-color: transparent;
            color: #d1d5db;
        }

        /* Formatted content inside bot bubble */
        .bot-bubble ul {
            list-style: disc;
            padding-left: 1.2rem;
            margin: 0.3rem 0;
        }

        .bot-bubble ol {
            list-style: decimal;
            padding-left: 1.2rem;
            margin: 0.3rem 0;
        }

        .bot-bubble li {
            margin-bottom: 0.25rem;
        }

        .bot-bubble p {
            margin: 0.2rem 0;
        }

        .bot-bubble strong {
            color: #fff;
            font-weight: 600;
        }

        .bot-bubble a {
            color: #a78bfa;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .bot-bubble a:hover {
            text-decoration: underline;
        }

        .bot-bubble code {
            background: #1e293b;
            padding: 1px 5px;
            border-radius: 4px;
            color: #c4b5fd;
            font-size: 0.7rem;
        }

        .bot-bubble hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 0.4rem 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(2px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar-img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: #1f2937;
            padding: 1.5px;
            margin-top: 1px;
        }

        .input-footer {
            flex-shrink: 0;
            padding-bottom: 1.25rem;
            padding-top: 0.5rem;
            display: flex;
            justify-content: center;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            z-index: 100;
        }

        .floating-input-bar {
            width: 85%;
            max-width: 550px;
            background: rgba(33, 38, 45, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            padding: 0.25rem 0.4rem 0.25rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
        }

        .floating-input-bar:focus-within {
            border-color: rgba(139, 92, 246, 0.4);
            background: rgba(33, 38, 45, 0.95);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-size: 0.775rem;
            color: #fff;
            padding: 0.35rem 0;
            max-height: 60px;
        }

        #user-input::placeholder {
            color: #6b7280;
        }

        .send-btn-pill {
            width: 26px;
            height: 26px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .send-btn-pill:hover {
            background: #f4f4f5;
            transform: scale(1.05);
        }

        .suggest-btn {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .suggest-btn:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.05);
            transform: translateY(-2px);
        }

        .typing-dot {
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-2px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="mesh-gradient"></div>

    <div class="app">

        <header class="px-6 py-2 flex items-center justify-between border-b border-[#30363d] bg-[#0d1117]/80 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712038.png" class="w-7 h-7" alt="Bot Icon">
                <div>
                    <h1 class="font-bold text-sm text-zinc-100 tracking-tight">Fida's Personal AI</h1>
                    <p class="text-[9px] text-green-500 font-medium flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Online
                    </p>
                </div>
            </div>
            <button onclick="resetChat()" class="p-1.5 rounded-lg hover:bg-white/5 text-zinc-400 transition-colors" title="Reset chat">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
            </button>
        </header>

        <main id="chat-area" class="flex-1 overflow-y-auto custom-scroll flex flex-col">

            <div id="hero" class="max-w-[850px] mx-auto w-full px-6 flex-1 flex flex-col items-center justify-center text-center">
                <h2 class="text-4xl font-bold mb-4 tracking-tight">Halo! Apa yang ingin kamu ketahui?</h2>
                <p class="text-zinc-400 text-base mb-12">Tanyakan tentang pengalaman, skill, atau proyek Fida.</p>

                <div class="flex flex-wrap justify-center gap-3.5">
                    <button onclick="sendSuggested(this)" class="suggest-btn">
                        <i data-lucide="user" class="w-4 h-4 text-purple-400"></i>
                        <span>Siapa Fida?</span>
                    </button>
                    <button onclick="sendSuggested(this)" class="suggest-btn">
                        <i data-lucide="briefcase" class="w-4 h-4 text-pink-400"></i>
                        <span>Pengalaman Kerja</span>
                    </button>
                    <button onclick="sendSuggested(this)" class="suggest-btn">
                        <i data-lucide="code" class="w-4 h-4 text-blue-400"></i>
                        <span>Portfolio Proyek</span>
                    </button>
                    <button onclick="sendSuggested(this)" class="suggest-btn">
                        <i data-lucide="layers" class="w-4 h-4 text-orange-400"></i>
                        <span>Skill & Tech Stack</span>
                    </button>
                    <button onclick="sendSuggested(this)" class="suggest-btn">
                        <i data-lucide="mail" class="w-4 h-4 text-emerald-400"></i>
                        <span>Cara Menghubungi</span>
                    </button>
                </div>
            </div>

            <div id="messages-wrapper" class="max-w-[850px] mx-auto w-full px-4 pt-6 pb-4"></div>
        </main>

        <footer class="input-footer">
            <div class="floating-input-bar">
                <textarea
                    id="user-input"
                    rows="1"
                    placeholder="Tanya Apapun Tentang Fida"
                    autocomplete="off"
                ></textarea>
                <div class="flex items-center gap-2 pr-1">
                    <button id="send-btn" onclick="sendMessage()" class="send-btn-pill">
                        <i data-lucide="arrow-up" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>
        </footer>

    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const wrapper = document.getElementById('messages-wrapper');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const hero = document.getElementById('hero');

        let history = [];

        lucide.createIcons();

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 60) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendSuggested(btn) {
            input.value = btn.querySelector('span').innerText;
            sendMessage();
        }

        function addMessage(role, text) {
            hero.classList.add('hidden');
            hero.classList.remove('flex');

            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${role === 'user' ? 'user-align' : 'bot-align'}`;

            const container = document.createElement('div');
            container.className = 'message-container';

            const avatar = document.createElement('img');
            avatar.className = 'avatar-img';
            avatar.src = role === 'user'
                ? "https://cdn-icons-png.flaticon.com/512/1998/1998592.png"
                : "https://cdn-icons-png.flaticon.com/512/4712/4712038.png";

            const bubble = document.createElement('div');
            bubble.className = `bubble ${role === 'user' ? 'user-bubble' : 'bot-bubble'}`;
            bubble.innerHTML = role === 'user' ? escapeHtml(text) : formatMarkdown(text);

            container.appendChild(avatar);
            container.appendChild(bubble);
            wrapperDiv.appendChild(container);
            wrapper.appendChild(wrapperDiv);

            scrollBottom();
            lucide.createIcons();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatMarkdown(text) {
            const lines = text.split('\n');
            let html = '';
            let inUl = false;
            let inOl = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // inline formatting
                line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                line = line.replace(/`(.+?)`/g, '<code>$1</code>');

                // link
                line = line.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
                    '<a href="$2" target="_blank">$1</a>');

                const trimmed = line.trim();

                // =========================
                // ✅ NUMBERED LIST
                // =========================
                if (/^\d+[\.\)]\s/.test(trimmed)) {
                    if (inUl) { html += '</ul>'; inUl = false; }

                    if (!inOl) {
                        html += '<ol>';
                        inOl = true;
                    }

                    const content = trimmed.replace(/^\d+[\.\)]\s*/, '');
                    html += `<li><strong>${content}</strong>`;
                    continue;
                }

                // =========================
                // ✅ SUB CONTENT (Periode, Role, dll)
                // =========================
                if (/^(Periode|Role|Tugas|Deskripsi)/i.test(trimmed)) {
                    html += `<div style="margin-left:12px">${line}</div>`;
                    continue;
                }

                // =========================
                // ✅ BULLET
                // =========================
                if (/^[-•]\s+/.test(trimmed)) {
                    const content = trimmed.replace(/^[-•]\s+/, '');

                    html += `<ul style="margin-left:16px"><li>${content}</li></ul>`;
                    continue;
                }

                // =========================
                // ✅ EMPTY
                // =========================
                if (trimmed === '') {
                    html += '<br>';
                    continue;
                }

                // =========================
                // ✅ NORMAL TEXT
                // =========================
                if (inUl) { html += '</ul>'; inUl = false; }

                // 🔥 JANGAN tutup ol di tengah-tengah
                html += `</li><p>${line}</p>`;
            }

            if (inUl) html += '</ul>';
            if (inOl) html += '</li></ol>';

            return html;
        }

        function addTyping() {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.id = 'typing-indicator';
            wrapperDiv.className = 'message-wrapper bot-align';
            wrapperDiv.innerHTML = `
                <div class="message-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712038.png" class="avatar-img">
                    <div class="flex gap-1 items-center pt-2.5 px-2">
                        <div class="w-1 h-1 bg-zinc-500 rounded-full typing-dot"></div>
                        <div class="w-1 h-1 bg-zinc-500 rounded-full typing-dot" style="animation-delay: 0.2s"></div>
                        <div class="w-1 h-1 bg-zinc-500 rounded-full typing-dot" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            wrapper.appendChild(wrapperDiv);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        function scrollBottom() {
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            addTyping();

            history.push({ role: 'user', content: text });

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: history.slice(0, -1) })
                });

                const data = await res.json();
                const reply = data.reply || 'Maaf, ada kendala koneksi.';

                removeTyping();
                addMessage('bot', reply);
                history.push({ role: 'assistant', content: reply });

            } catch (err) {
                removeTyping();
                addMessage('bot', 'Koneksi terputus. Coba lagi ya 🙏');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function resetChat() {
            history = [];
            wrapper.innerHTML = '';
            hero.classList.remove('hidden');
            hero.classList.add('flex');
            input.value = '';
            input.style.height = 'auto';
        }
    </script>
</body>
</html>
